# Información del proyecto
sonar.projectKey=finova-backend
sonar.projectName=Finova-Backend
sonar.projectVersion=0.0.1-SNAPSHOT

# Codificación del código fuente
sonar.sourceEncoding=UTF-8

# Ubicación del código fuente y tests
sonar.sources=src/main/kotlin
sonar.tests=src/test/kotlin

# Ruta al reporte de cobertura de JaCoCo (XML)
sonar.coverage.jacoco.xmlReportPaths=build/reports/jacoco/test/jacocoTestReport.xml

# Excluir archivos de test del análisis de cobertura
sonar.coverage.exclusions=\
  **/*Test.kt,\
  **/*Tests.kt,\
  **/test/**,\
  **/*Application.kt,\
  **/*ApplicationKt.class,\
  **/config/**

# Excluir archivos de test de duplicaciones y code smells
sonar.exclusions=\
  **/test/**,\
  **/*Test.kt,\
  **/*Tests.kt

# Lenguaje del proyecto
sonar.language=kotlin

# Binarios compilados (necesario para análisis de Kotlin)
sonar.java.binaries=build/classes/kotlin/main
sonar.java.test.binaries=build/classes/kotlin/test