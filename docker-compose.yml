services:
  # ==================== INFRASTRUCTURE ====================
  eureka-service:
    image: ${ECR_REGISTRY}/finova/eureka-service:${IMAGE_TAG}
    restart: always
    ports:
      - "8761:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  config-service:
    image: ${ECR_REGISTRY}/finova/config-service:${IMAGE_TAG}
    restart: always
    depends_on:
      eureka-service:
        condition: service_healthy
    ports:
      - "8888:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  gateway-service:
    image: ${ECR_REGISTRY}/finova/gateway-service:${IMAGE_TAG}
    restart: always
    depends_on:
      eureka-service:
        condition: service_healthy
      config-service:
        condition: service_healthy
    ports:
      - "8000:8080"

  # ==================== DATABASES ====================
  auth-db:
    image: postgres:16
    container_name: auth-db
    restart: always
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: ${AUTH_DB_USER:-auth_user}
      POSTGRES_PASSWORD: ${AUTH_DB_PASS:-auth_pass}
    ports:
      - "5433:5432"
    volumes:
      - auth-data:/var/lib/postgresql/data

  user-db:
    image: postgres:16
    container_name: user-db
    restart: always
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: ${USER_DB_USER:-user_user}
      POSTGRES_PASSWORD: ${USER_DB_PASS:-user_pass}
    ports:
      - "5436:5432"
    volumes:
      - user-data:/var/lib/postgresql/data

  account-db:
    image: postgres:16
    container_name: account-db
    restart: always
    environment:
      POSTGRES_DB: account_db
      POSTGRES_USER: ${ACCOUNT_DB_USER:-account_user}
      POSTGRES_PASSWORD: ${ACCOUNT_DB_PASS:-account_pass}
    ports:
      - "5434:5432"
    volumes:
      - account-data:/var/lib/postgresql/data

  transaction-db:
    image: postgres:16
    container_name: transaction-db
    restart: always
    environment:
      POSTGRES_DB: transaction_db
      POSTGRES_USER: ${TRANSACTION_DB_USER:-transaction_user}
      POSTGRES_PASSWORD: ${TRANSACTION_DB_PASS:-transaction_pass}
    ports:
      - "5435:5432"
    volumes:
      - transaction-data:/var/lib/postgresql/data

  # ==================== MESSAGING & CACHE ====================
  kafka:
    image: apache/kafka:latest
    container_name: kafka
    restart: always
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_OFFSETS_TOPIC_NUM_PARTITIONS: 50
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  redis:
    image: redis:latest
    container_name: redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== MICROSERVICES ====================
  auth-service:
    image: ${ECR_REGISTRY}/finova/auth-service:${IMAGE_TAG}
    restart: always
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://auth-db:5432/auth_db
      SPRING_DATASOURCE_USERNAME: ${AUTH_DB_USER:-auth_user}
      SPRING_DATASOURCE_PASSWORD: ${AUTH_DB_PASS:-auth_pass}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DATA_REDIS_HOST: redis
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-service:8080/eureka/
    depends_on:
      auth-db:
        condition: service_started
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      eureka-service:
        condition: service_healthy
    ports:
      - "8081:8080"

  user-service:
    image: ${ECR_REGISTRY}/finova/user-service:${IMAGE_TAG}
    restart: always
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://user-db:5432/user_db
      SPRING_DATASOURCE_USERNAME: ${USER_DB_USER:-user_user}
      SPRING_DATASOURCE_PASSWORD: ${USER_DB_PASS:-user_pass}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DATA_REDIS_HOST: redis
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-service:8080/eureka/
    depends_on:
      user-db:
        condition: service_started
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      eureka-service:
        condition: service_healthy
    ports:
      - "8082:8080"

  account-service:
    image: ${ECR_REGISTRY}/finova/account-service:${IMAGE_TAG}
    restart: always
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://account-db:5432/account_db
      SPRING_DATASOURCE_USERNAME: ${ACCOUNT_DB_USER:-account_user}
      SPRING_DATASOURCE_PASSWORD: ${ACCOUNT_DB_PASS:-account_pass}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DATA_REDIS_HOST: redis
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-service:8080/eureka/
    depends_on:
      account-db:
        condition: service_started
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      eureka-service:
        condition: service_healthy
    ports:
      - "8083:8080"

  transaction-service:
    image: ${ECR_REGISTRY}/finova/transaction-service:${IMAGE_TAG}
    restart: always
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://transaction-db:5432/transaction_db
      SPRING_DATASOURCE_USERNAME: ${TRANSACTION_DB_USER:-transaction_user}
      SPRING_DATASOURCE_PASSWORD: ${TRANSACTION_DB_PASS:-transaction_pass}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DATA_REDIS_HOST: redis
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-service:8080/eureka/
    depends_on:
      transaction-db:
        condition: service_started
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      eureka-service:
        condition: service_healthy
    ports:
      - "8084:8080"

  notification-service:
    image: ${ECR_REGISTRY}/finova/notification-service:${IMAGE_TAG}
    restart: always
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-service:8080/eureka/
    depends_on:
      kafka:
        condition: service_healthy
      eureka-service:
        condition: service_healthy
    ports:
      - "8085:8080"

volumes:
  auth-data:
  user-data:
  account-data:
  transaction-data:
  kafka_data:
  redis_data:
