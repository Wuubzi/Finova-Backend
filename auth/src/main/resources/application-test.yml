spring:
  main:
    web-application-type: none
    allow-bean-definition-overriding: true
  cloud:
    discovery:
      enabled: false
    config:
      enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  secret: dGVzdC1zZWNyZXQta2V5LXRlc3Qtc2VjcmV0LWtleQ==y


eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false
